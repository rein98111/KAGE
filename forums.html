<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAGE - 玩家討論區</title>
    <link rel="icon" href="images/4uzsh-pzbi4-001.ico" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="forums.css">
</head>
<body style="background-image: url('images/bg2.png');">
    <div class="main-bg"></div>

    <header class="navbar-container">
        <div class="nav-logo-wrapper">
            <a href="index.html" class="nav-logo-link">
                <img src="images/icon.png" alt="KAGE Icon" class="logo-img">
            </a>
        </div>
        
        <nav class="nav-tabs">
            <a href="index.html" class="nav-item active" data-page="home">
                <span class="nav-sub">首頁</span>
                <span class="nav-text">HOME</span>
            </a>
            <a href="news.html" class="nav-item" data-page="news">
                <span class="nav-sub">新聞公告</span>
                <span class="nav-text">NEWS</span>
            </a>
            <a href="maps.html" class="nav-item" data-page="maps">
                <span class="nav-sub">譜面一覽</span>
                <span class="nav-text">MAPS</span>
            </a>
            <a href="info.html" class="nav-item" data-page="info">
                <span class="nav-sub">遊戲介紹</span>
                <span class="nav-text">INFO</span>
            </a>
			<a href="forums.html" class="nav-item" data-page="forums">
                <span class="nav-sub">玩家討論</span>
                <span class="nav-text">FORUMS</span>
            </a>
        </nav>
    </header>

    <main class="forums-container">
        <div class="forums-panel">
            
            <div class="page-title-zone">
                <span class="page-title-en">PLAYER FORUMS</span>
                <h2 class="page-title-zh">玩家討論區</h2>
                <div class="title-underline"></div>
            </div>

            <div class="forum-post-box">
                <div class="input-group">
                    <input type="text" id="post-author" placeholder="PLAYER NAME (暱稱)..." maxlength="20">
                </div>
                <div class="input-group">
                    <textarea id="post-content" placeholder="WRITE YOUR COMMENT HERE (留下你想說的話...)" maxlength="500"></textarea>
                </div>
                <div class="submit-btn-wrapper">
                    <button id="post-submit-btn" onclick="submitPost()">發布文章 / POST_</button>
                </div>
            </div>

            <div class="forum-divider">// DISCUSSIONS_</div>

            <div id="forum-list-container">
                <div class="forum-loading">// LOADING DATA FROM STREAM_</div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-left">
                <div class="footer-team-logo">KAGE PROJECT</div>
                <div class="footer-copyright">
                    <p>© 2026 KAGE PROJECT / GOOGLE GEMINI / CHATGPT</p>
                    <p>本網站及遊戲之內容，均由 AI 生成，包含代碼、些許圖片。</p>
                </div>
            </div>
            <div class="footer-center">
                <div class="footer-links">
                    <a href="#">隱私權條款</a>
                    <span class=\"footer-link-divider\">|</span>
                    <a href="#">使用者服務協議</a>
                </div>
            </div>
            <div class="footer-right">
                <div class="rating-badge-general">
                    <span class="badge-num">0+</span>
                    <span class="badge-text">普遍級</span>
                </div>
                <ul class="warning-list">
                    <li>※本討論區為公開交流空間，請維持友善言論。</li>
                    <li>※本遊戲專注於音樂節奏與譜面觀測，無任何虛擬遊戲幣、商城付費或轉蛋要素。</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="forums.js"></script>
</body>
</html>
